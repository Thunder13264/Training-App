<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>PureSweat Training</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;--orange:#E8692A;--orange-dim:#7a3512;--text:#f0f0f0;--text2:#9a9a9a;--text3:#555;--r:18px;--rs:12px;}
html,body{height:100%;overflow:hidden;background:#0f0f0f;}
.shell{width:100%;max-width:420px;margin:0 auto;height:100dvh;position:relative;overflow:hidden;background:#0f0f0f;font-family:'DM Sans',sans-serif;color:#f0f0f0;display:block;}
.pg{position:absolute;inset:0;display:none;flex-direction:column;height:100%;}
.pg.on{display:flex;}
.scrollable{flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;}
.scrollable::-webkit-scrollbar{display:none;}

.home-topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 8px;flex-shrink:0;}
.wordmark{font-size:17px;font-weight:600;letter-spacing:-0.4px;color:#f0f0f0;}
.wordmark em{color:#E8692A;font-style:normal;}
.date-pill{font-size:11px;color:#9a9a9a;background:#242424;padding:5px 12px;border-radius:20px;}
.greeting{font-size:21px;font-weight:300;color:#f0f0f0;letter-spacing:-0.4px;padding:4px 20px 14px;}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 12px;}
.tile{background:#1a1a1a;border-radius:18px;padding:16px;cursor:pointer;border:1px solid #2a2a2a;min-height:100px;display:flex;flex-direction:column;justify-content:space-between;}
.tile:active{background:#2e2e2e;}
.t-icon{width:34px;height:34px;border-radius:10px;background:#242424;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.t-icon svg{width:15px;height:15px;fill:none;stroke:#E8692A;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.t-label{font-size:13px;font-weight:600;color:#f0f0f0;}
.t-sub{font-size:11px;color:#9a9a9a;margin-top:2px;}
.card{background:#1a1a1a;border-radius:18px;border:1px solid #2a2a2a;margin:0 16px 12px;padding:16px;}
.day-pills{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;scrollbar-width:none;padding-bottom:2px;}
.day-pills::-webkit-scrollbar{display:none;}
.dp{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #333;background:transparent;color:#9a9a9a;}
.dp.sel{background:#E8692A;border-color:#E8692A;color:#fff;}
.dp.lit{border-color:#7a3512;color:#f0f0f0;}
.dial-row{display:flex;align-items:center;gap:14px;}
.dial-svg-wrap{position:relative;width:120px;height:120px;flex-shrink:0;}
.dial-svg-wrap svg{width:120px;height:120px;transform:rotate(-90deg);}
.d-bg{fill:none;stroke:#2a2a2a;stroke-width:10;}
.d-arc{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dasharray .6s,stroke-dashoffset .6s;}
.dial-mid{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.dial-big{font-size:22px;font-weight:600;color:#f0f0f0;line-height:1;}
.dial-sm{font-size:10px;color:#9a9a9a;margin-top:2px;}
.segs{display:flex;flex-direction:column;gap:8px;flex:1;}
.seg{display:flex;align-items:center;gap:7px;}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sinfo{flex:1;}
.sname{font-size:10px;color:#9a9a9a;}
.sbar{height:3px;background:#2a2a2a;border-radius:2px;margin-top:3px;overflow:hidden;}
.sbar-f{height:100%;border-radius:2px;transition:width .5s;}
.spct{font-size:11px;font-weight:600;color:#f0f0f0;min-width:26px;text-align:right;}
.timer-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.timer-lbl{font-size:11px;font-weight:600;color:#9a9a9a;text-transform:uppercase;letter-spacing:.6px;}
.timer-badge{font-size:10px;color:#E8692A;background:#7a3512;padding:3px 9px;border-radius:10px;font-weight:600;}
.timer-num{font-size:40px;font-weight:300;color:#f0f0f0;letter-spacing:-2px;line-height:1;font-variant-numeric:tabular-nums;margin-bottom:10px;}
.t-track{height:3px;background:#2a2a2a;border-radius:2px;overflow:hidden;margin-bottom:7px;}
.t-fill{height:100%;background:#E8692A;border-radius:2px;transition:width 1s linear;}
.t-rem{font-size:11px;color:#9a9a9a;margin-bottom:12px;}
.t-btns{display:flex;gap:8px;}
.tbtn{flex:1;padding:11px;background:#E8692A;color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;}
.tbtn svg{width:11px;height:11px;fill:#fff;}
.tbtn.off{background:#242424;color:#f0f0f0;}
.tbtn.off svg{fill:#f0f0f0;}
.tghost{padding:11px 14px;background:#242424;color:#9a9a9a;border:none;border-radius:12px;font-size:13px;cursor:pointer;font-family:inherit;}

.wk-bar{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#0f0f0f;border-bottom:1px solid #1e1e1e;flex-shrink:0;}
.bk{width:34px;height:34px;border-radius:50%;background:#1a1a1a;border:1px solid #2a2a2a;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.bk svg{width:13px;height:13px;fill:none;stroke:#f0f0f0;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.wk-ttl{font-size:15px;font-weight:600;color:#f0f0f0;}
.wk-stl{font-size:11px;color:#9a9a9a;margin-top:1px;}
.stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:14px;}
.sbox{background:#1a1a1a;border-radius:12px;padding:10px 6px;text-align:center;border:1px solid #222;}
.sval{font-size:17px;font-weight:600;color:#f0f0f0;}
.slbl{font-size:10px;color:#9a9a9a;margin-top:2px;}
.sec{font-size:10px;font-weight:600;color:#555;letter-spacing:.8px;text-transform:uppercase;margin:14px 0 7px 2px;}
.bwrap{background:#1a1a1a;border:1px solid #222;border-radius:14px;margin-bottom:8px;overflow:hidden;}
.bhd{padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;}
.binfo{flex:1;min-width:0;}
.btitle{font-size:13px;font-weight:600;color:#f0f0f0;}
.bsub{font-size:11px;color:#9a9a9a;margin-top:1px;}
.bprog{display:flex;align-items:center;gap:5px;}
.bbar{width:32px;height:3px;background:#2a2a2a;border-radius:2px;overflow:hidden;}
.bbar-f{height:100%;background:#E8692A;border-radius:2px;transition:width .3s;}
.bpct{font-size:10px;color:#9a9a9a;min-width:22px;}
.btoggle{width:24px;height:24px;border-radius:50%;border:1px solid #2a2a2a;background:#242424;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.btoggle svg{width:10px;height:10px;fill:none;stroke:#9a9a9a;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s;}
.bwrap.open .btoggle svg{transform:rotate(90deg);}
.dlist{border-top:1px solid #1e1e1e;}
.drow{border-bottom:1px solid #1e1e1e;}
.drow:last-child{border-bottom:none;}
.dsumm{padding:10px 14px;display:flex;align-items:center;gap:9px;cursor:pointer;}
.dsumm:active{background:#242424;}
.dchk{width:20px;height:20px;border-radius:50%;border:1.5px solid #3a3a3a;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.dchk.done{background:#E8692A;border-color:#E8692A;}
.dchk svg{width:8px;height:8px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0;}
.dchk.done svg{opacity:1;}
.dinfo{flex:1;min-width:0;}
.dname{font-size:12px;color:#f0f0f0;line-height:1.3;}
.dtgt{font-size:11px;color:#9a9a9a;margin-top:1px;}
.dbadge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:7px;background:#1a2e0d;color:#7ab84a;white-space:nowrap;flex-shrink:0;}
.dexp{width:22px;height:22px;border-radius:50%;border:1px solid #2a2a2a;background:#242424;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dexp svg{width:10px;height:10px;fill:none;stroke:#9a9a9a;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s;}
.dexp.open{background:#E8692A;border-color:#E8692A;}
.dexp.open svg{stroke:#fff;transform:rotate(90deg);}
.dpanel{display:none;padding:0 14px 12px;background:#0f0f0f;}
.dpanel.on{display:block;}
.pin{padding-top:10px;}
.crow{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.clbl{font-size:12px;color:#9a9a9a;width:64px;flex-shrink:0;}
.cctl{display:flex;align-items:center;gap:9px;flex:1;}
.cadj{width:30px;height:30px;border-radius:50%;border:1px solid #333;background:#1a1a1a;font-size:17px;cursor:pointer;color:#f0f0f0;display:flex;align-items:center;justify-content:center;}
.cval{font-size:20px;font-weight:600;min-width:32px;text-align:center;color:#f0f0f0;}
.prow{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.ptrack{flex:1;height:3px;background:#2a2a2a;border-radius:2px;overflow:hidden;}
.pfill{height:100%;background:#E8692A;border-radius:2px;transition:width .2s;}
.pnum{font-size:11px;font-weight:600;color:#E8692A;min-width:30px;text-align:right;}
.nfield{width:100%;padding:8px 10px;border:1px solid #2a2a2a;border-radius:9px;font-size:12px;font-family:inherit;color:#f0f0f0;background:#1a1a1a;resize:none;margin-bottom:9px;line-height:1.4;outline:none;}
.nfield::placeholder{color:#555;}
.pactions{display:flex;gap:7px;}
.bdone{flex:1;padding:9px;background:#E8692A;color:#fff;border:none;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;}
.bdone svg{width:10px;height:10px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.bundo{padding:9px 12px;background:#242424;color:#9a9a9a;border:none;border-radius:9px;font-size:12px;cursor:pointer;font-family:inherit;}

.ov{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.75);z-index:60;align-items:flex-end;}
.ov.on{display:flex;}
.osheet{background:#1a1a1a;border-radius:22px 22px 0 0;padding:10px 20px 36px;width:100%;border-top:1px solid #2a2a2a;max-height:90%;overflow-y:auto;}
.osheet::-webkit-scrollbar{display:none;}
.ohandle{width:30px;height:3px;background:#3a3a3a;border-radius:2px;margin:0 auto 16px;}
.ohdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.otitle{font-size:15px;font-weight:600;color:#f0f0f0;}
.xbtn{width:26px;height:26px;border-radius:50%;background:#242424;border:1px solid #2a2a2a;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.xbtn svg{width:10px;height:10px;fill:none;stroke:#9a9a9a;stroke-width:2;stroke-linecap:round;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cday{border-radius:10px;padding:9px 3px;text-align:center;cursor:pointer;border:1px solid #2a2a2a;background:#242424;}
.cday:active{background:#2e2e2e;}
.cday.hlog{border-color:#7a3512;}
.cday .ca{font-size:9px;color:#9a9a9a;display:block;margin-bottom:2px;}
.cday .ck{font-size:12px;font-weight:600;color:#f0f0f0;}
.cday .cdot{width:4px;height:4px;border-radius:50%;background:#E8692A;margin:4px auto 0;}
.cwk{margin-top:12px;padding-top:12px;border-top:1px solid #222;}
.cwklbl{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;}
.cwki{font-size:12px;color:#9a9a9a;display:flex;gap:8px;margin-bottom:4px;}
.cwki b{font-weight:600;color:#f0f0f0;width:28px;flex-shrink:0;}
.sinp{width:100%;padding:9px 13px;border:1px solid #2a2a2a;border-radius:10px;font-size:13px;color:#f0f0f0;background:#242424;margin-bottom:12px;outline:none;font-family:inherit;}
.sinp::placeholder{color:#555;}
.hitem{padding:12px 14px;border:1px solid #222;border-radius:12px;margin-bottom:8px;cursor:pointer;background:#242424;}
.hitem:active{background:#2e2e2e;}
.hdate{font-size:10px;color:#9a9a9a;margin-bottom:3px;}
.hday{font-size:13px;font-weight:600;color:#f0f0f0;margin-bottom:6px;}
.hpills{display:flex;gap:5px;flex-wrap:wrap;}
.hpill{font-size:11px;padding:3px 8px;border-radius:8px;background:#1a1a1a;color:#9a9a9a;}
.empty{text-align:center;padding:40px 0;color:#555;font-size:13px;}
</style>
</head>
<body>
<div class="shell" id="shell">

<div class="pg on" id="pg-home">
  <div class="home-topbar">
    <div class="wordmark">Pure<em>Sweat</em></div>
    <div class="date-pill" id="dpill"></div>
  </div>
  <div class="scrollable">
    <div class="greeting" id="greet">Good morning.</div>
    <div class="tiles">
      <div class="tile" onclick="openCal()">
        <div class="t-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg></div>
        <div><div class="t-label">Workouts</div><div class="t-sub">This week</div></div>
      </div>
      <div class="tile" onclick="openHist()">
        <div class="t-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
        <div><div class="t-label">History</div><div class="t-sub" id="hsub">All sessions</div></div>
      </div>
    </div>
    <div class="card">
      <div class="day-pills" id="dpills"></div>
      <div class="dial-row">
        <div class="dial-svg-wrap">
          <svg viewBox="0 0 120 120">
            <circle class="d-bg" cx="60" cy="60" r="50"/>
            <circle class="d-arc" id="am" cx="60" cy="60" r="50" stroke="#f0f0f0"/>
            <circle class="d-arc" id="as" cx="60" cy="60" r="50" stroke="#E8692A"/>
            <circle class="d-arc" id="ah" cx="60" cy="60" r="50" stroke="#378ADD"/>
            <circle class="d-arc" id="astr" cx="60" cy="60" r="50" stroke="#9b6fd4"/>
          </svg>
          <div class="dial-mid"><div class="dial-big" id="dpct">0%</div><div class="dial-sm" id="dlbl">today</div></div>
        </div>
        <div class="segs" id="segs"></div>
      </div>
    </div>
    <div class="card">
      <div class="timer-top"><div class="timer-lbl">Workout timer</div><div class="timer-badge">Goal: 3 hr</div></div>
      <div class="timer-num" id="tdisp">0:00:00</div>
      <div class="t-track"><div class="t-fill" id="tfill" style="width:0%"></div></div>
      <div class="t-rem" id="trem">3 hr 0 min remaining</div>
      <div class="t-btns">
        <button class="tbtn off" id="tbtn" onclick="timerToggle()">
          <svg id="tico" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <span id="tlbl">Start workout</span>
        </button>
        <button class="tghost" id="trst" onclick="timerReset()" style="display:none">Reset</button>
      </div>
    </div>
    <div style="height:20px"></div>
  </div>
</div>

<div class="pg" id="pg-wk">
  <div class="wk-bar">
    <div class="bk" onclick="goHome()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></div>
    <div><div class="wk-ttl" id="wttl">Monday</div><div class="wk-stl" id="wstl"></div></div>
  </div>
  <div class="scrollable" id="wkcontent" style="padding:14px 16px 48px;"></div>
</div>

<div class="ov" id="ov-cal" onclick="if(event.target===this)closeCal()">
  <div class="osheet">
    <div class="ohandle"></div>
    <div class="ohdr"><div class="otitle">This week</div><button class="xbtn" onclick="closeCal()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="cal-grid" id="calgrid"></div>
    <div class="cwk"><div class="cwklbl">Schedule</div><div id="cwkrows"></div></div>
  </div>
</div>

<div class="ov" id="ov-hist" onclick="if(event.target===this)closeHist()">
  <div class="osheet">
    <div class="ohandle"></div>
    <div class="ohdr"><div class="otitle">History</div><button class="xbtn" onclick="closeHist()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <input class="sinp" type="text" placeholder="Search sessions..." id="sinp" oninput="renderHist()"/>
    <div id="hlist"></div>
  </div>
</div>

</div>
<script>
const WB=[
  {name:'Part 1: Mobility',cat:'m',drills:[{n:'Leg swings front/back',t:'15 each leg',s:'reps'},{n:'Leg swings side to side',t:'15 each leg',s:'reps'},{n:"World's greatest stretch",t:'8 each side',s:'reps'},{n:'Hip 90/90 switches',t:'10 each side',s:'reps'},{n:'Inchworms',t:'8 reps',s:'reps'},{n:'A-skips',t:'3x20 yards',s:'reps'},{n:'Lateral shuffle',t:'3x20 yards each',s:'reps'},{n:'Bodyweight squats',t:'20 reps',s:'reps'},{n:'Walking lunges',t:'10 each leg',s:'reps'},{n:'Wrist/finger rolls',t:'60 sec',s:'reps'}]},
  {name:'Part 2: Close Shooting Progression',cat:'s',drills:[{n:'Form shot — straight on (3 ft)',t:'Make 3 in a row',s:'shooting'},{n:'Form shot — right baseline (3 ft)',t:'Make 3 in a row',s:'shooting'},{n:'Form shot — left baseline (3 ft)',t:'Make 3 in a row',s:'shooting'},{n:'Step-back — straight on (5 ft)',t:'Make 3 in a row',s:'shooting'},{n:'Step-back — right baseline (5 ft)',t:'Make 3 in a row',s:'shooting'},{n:'Step-back — left baseline (5 ft)',t:'Make 3 in a row',s:'shooting'}]},
  {name:'Part 3: Free Throws',cat:'s',drills:[{n:'Free throws — waves of 5',t:'25 makes total',s:'shooting'}]},
  {name:'Part 4: Mid-Range Bridge',cat:'s',drills:[{n:'Jab left — 1-dribble pull-up (free throw line)',t:'5 makes each direction',s:'shooting'},{n:'Jab left — 1-dribble pull-up (right elbow)',t:'5 makes each direction',s:'shooting'},{n:'Rip-through into pull-up (free throw line)',t:'5 makes each direction',s:'shooting'}]},
  {name:'Part 5: Stationary Handles',cat:'h',drills:[{n:'Pound dribble (R)',t:'3x30 sec',s:'reps'},{n:'Pound dribble (L)',t:'3x30 sec',s:'reps'},{n:'Crossover (low & hard)',t:'3x30 sec',s:'reps'},{n:'Between legs (front to back)',t:'3x30 sec',s:'reps'},{n:'Behind the back (stationary)',t:'3x30 sec',s:'reps'},{n:'Two-ball pound same height',t:'3x30 sec',s:'reps'},{n:'Figure 8 with dribble',t:'3x30 sec',s:'reps'},{n:'Spider dribble',t:'3x30 sec',s:'reps'},{n:'Machine gun (low pound)',t:'3x30 sec',s:'reps'}]},
];
const DAYS=[
  {key:'MON',lb:'Mon',full:'Monday',focus:'Handles + Shooting + Lower Body',blocks:[
    {nm:'Block A: Kyrie Foundation Drills',cat:'h',drills:[{n:'In-and-out dribble — read the sag (R)',t:'3x30 sec',s:'reps'},{n:'In-and-out dribble — read the sag (L)',t:'3x30 sec',s:'reps'},{n:'Speed dribble — dead stop — read (R)',t:'8 trips',s:'reps'},{n:'Speed dribble — dead stop — read (L)',t:'8 trips',s:'reps'},{n:'In-and-out — defender bites — crossover (R)',t:'10 reps',s:'reps'},{n:'In-and-out — defender bites — crossover (L)',t:'10 reps',s:'reps'}]},
